<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Activity Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0d0d12; overflow-x: hidden; position: relative;
        }
        body::before, body::after {
            content: ""; position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: linear-gradient(45deg, #6a11cb, #ff6a00, #ee0979); filter: blur(100px); z-index: -1;
            opacity: 0.4; animation: meshMove 20s infinite alternate;
        }
        body::after { background: linear-gradient(45deg, #2575fc, #00f2fe, #764ba2); right: -5%; bottom: -5%; animation-delay: -10s; }
        @keyframes meshMove { 0% { transform: translate(-10%, -10%) rotate(0deg); } 100% { transform: translate(10%, 10%) rotate(180deg); } }

        .navbar { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 0; }
        .navbar-brand { font-weight: 800; color: white !important; }

        .glass-card {
            border-radius: 24px; padding: 40px; text-align: center;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white; transition: 0.4s; height: 100%;
        }
        .glass-card:hover { transform: translateY(-10px); border-color: #ee0979; }

        .btn-glow { border-radius: 12px; font-weight: bold; border: none; padding: 14px; transition: 0.3s; color: white; text-transform: uppercase; letter-spacing: 1px; }
        .btn-upload { background: linear-gradient(90deg, #2575fc, #6a11cb); }
        .btn-pass { background: linear-gradient(90deg, #ee0979, #ff6a00); }

        /* MODAL STYLES WITH IMPROVED VISIBILITY */
        .modal-content { background: rgba(25, 25, 35, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; color: white; }
        .modal-header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-close { filter: invert(1); }
        
        /* THE VISIBILITY FIX */
        .form-control { 
            background: rgba(255, 255, 255, 0.1) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            color: #ffffff !important; 
            border-radius: 12px; 
            padding: 12px;
        }
        .form-control::placeholder { 
            color: rgba(255, 255, 255, 0.6) !important; 
            opacity: 1; 
        }

        #alertBox { position: fixed; top: 20px; right: 20px; z-index: 1060; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid #00f2fe; color: #00f2fe; border-radius: 12px; padding: 15px 25px; }
        .d-none { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">⚡ ACTIVITY MONITOR</span>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-4">Logout</a>
        </div>
    </nav>

    <div class="container mt-5 pt-4">
        <div id="alertBox" class="d-none"></div>

        <div class="text-center mb-5">
            <h1 style="font-weight: 800; color: white;">User Dashboard</h1>
            <p style="color: rgba(255,255,255,0.5);">Manage your secure logs and account settings</p>
        </div>

        <div class="row justify-content-center g-5">
            <div class="col-md-5">
                <div class="glass-card">
                    <span style="font-size: 50px;">📁</span>
                    <h4 class="fw-bold mb-3">Upload File</h4>
                    <p class="small text-white-50 mb-4">Click below to select and upload a secure file.</p>
                    <button class="btn btn-glow btn-upload w-100" data-bs-toggle="modal" data-bs-target="#uploadModal">Choose File</button>
                </div>
            </div>

            <div class="col-md-5">
                <div class="glass-card">
                    <span style="font-size: 50px;">🔒</span>
                    <h4 class="fw-bold mb-3">Privacy Shield</h4>
                    <p class="small text-white-50 mb-4">Click below to change your access credentials.</p>
                    <button class="btn btn-glow btn-pass w-100" data-bs-toggle="modal" data-bs-target="#passwordModal">Update Password</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">File Upload Panel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form action="UploadServlet" method="POST" enctype="multipart/form-data">
                        <label class="small text-white-50 mb-2">Select a document:</label>
                        <input type="file" name="myfile" class="form-control mb-4" required>
                        <button type="submit" class="btn btn-glow btn-upload w-100">Confirm Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Update Credentials</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form action="PasswordServlet" method="POST">
                        <label class="small text-white-50 mb-2">Enter your new secure password:</label>
                        <input type="password" name="newpassword" class="form-control mb-4" placeholder="Enter New Password Here..." required>
                        <button type="submit" class="btn btn-glow btn-pass w-100">Confirm Change</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("status") === "success") {
            const alertBox = document.getElementById("alertBox");
            alertBox.innerHTML = "✨ " + params.get("msg");
            alertBox.classList.remove("d-none");
            setTimeout(() => { alertBox.classList.add("d-none"); }, 4000);
        }
    </script>
</body>
</html>
