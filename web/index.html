<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Activity Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    /* ===== DYNAMIC MESH BACKGROUND ===== */
    body {
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #0d0d12;
        overflow: hidden;
        position: relative;
    }

    /* Animated colorful blobs for that "Aesthetic" look */
    body::before, body::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: linear-gradient(45deg, #6a11cb, #ff6a00, #ee0979);
        filter: blur(80px);
        z-index: -1;
        opacity: 0.6;
        animation: meshMove 15s infinite alternate;
    }

    body::after {
        background: linear-gradient(45deg, #2575fc, #00f2fe, #764ba2);
        width: 600px;
        height: 600px;
        right: -10%;
        bottom: -10%;
        animation-delay: -7s;
    }

    @keyframes meshMove {
        0% { transform: translate(-20%, -20%) rotate(0deg); }
        100% { transform: translate(20%, 20%) rotate(180deg); }
    }

    /* ===== GLOWING LOGIN CARD ===== */
    .login-card {
        width: 360px;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        color: white;
        position: relative;
        overflow: hidden; /* Contains the glowing border effect */
        animation: cardAppear 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    /* Rainbow border animation */
    .login-card::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(transparent, #ff6a00, #ee0979, #2575fc, transparent 30%);
        animation: rotateBorder 6s linear infinite;
        z-index: -2;
    }

    /* Inner card mask to keep the border thin */
    .login-card::after {
        content: "";
        position: absolute;
        inset: 2px;
        background: #121217; /* Dark background to match body */
        border-radius: 22px;
        z-index: -1;
        opacity: 0.9;
    }

    @keyframes rotateBorder {
        100% { transform: rotate(360deg); }
    }

    @keyframes cardAppear {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Title Styling */
    .login-card h3 {
        margin-bottom: 30px;
        font-weight: 800;
        letter-spacing: 1px;
        background: linear-gradient(to right, #fff, #bbb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Inputs with Float/Glow Effect */
    .form-control {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 12px;
        padding: 12px 15px;
        color: white !important;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.1) !important;
        border-color: #ee0979 !important;
        box-shadow: 0 0 15px rgba(238, 9, 121, 0.3) !important;
        transform: translateY(-2px);
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    /* Magnetic Gradient Button */
    .btn-custom {
        border-radius: 12px;
        background: linear-gradient(90deg, #ee0979, #ff6a00);
        color: white;
        font-weight: bold;
        border: none;
        padding: 12px;
        margin-top: 10px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-custom:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 10px 20px rgba(238, 9, 121, 0.4);
        filter: brightness(1.1);
    }

    .btn-custom:active {
        transform: translateY(0);
    }

    /* Footer text */
    .footer-text {
        margin-top: 25px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.4);
    }
</style>
</head>

<body>

<div class="login-card">
    <h3>🔐 LOGIN</h3>

    <form action="LoginServlet" method="POST">
        <input type="text" 
               name="username" 
               class="form-control mb-3" 
               placeholder="Username" 
               required>

        <input type="password" 
               name="password" 
               class="form-control mb-3" 
               placeholder="Password" 
               required>

        <button type="submit" class="btn btn-custom w-100">Login Session</button>
    </form>

    <div class="footer-text">
        Activity Monitoring System
    </div>
</div>

</body>
</html>
